[[sources.dns]]
type = "publicdns_info"
min_reliability = 0.50

[[sources.dns]]
type = "manual"
path = "configs/manual-dns.txt"

[[sources.doh]]
type = "curl_wiki"

[[sources.doh]]
type = "adguard"

[[sources.doh]]
type = "manual"
path = "configs/manual-doh.toml"

[validation]
rounds = 3
timeout_ms = 2000
parallelism = 50
doh_parallelism = 20
require_tcp_for_dns = false
require_tls_valid_for_doh = true

[validation.dns_backend]
kind = "python"
massdns_bin = "massdns"
hashmap_size = 2000
processes = 1
socket_count = 1
interval_ms = 0
predictable = true
flush = true
batch_max_queries = 50000
stderr_log_level = "debug"
fallback_to_python_on_error = true

[validation.corpus]
mode = "external"
path = "../probe-corpus/probe-corpus.json"
allow_builtin_fallback = true

[scoring]
accept_min_score = 80
candidate_min_score = 60

[export]
formats = ["json", "text", "dnsdist", "unbound"]
output_dir = "outputs/latest"
