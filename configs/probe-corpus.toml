[probe_corpus]
schema_version = 2
corpus_version = "dev"
seed_path = "configs/probe-corpus-seeds.json"
min_exact_probes = 8
min_consensus_probes = 3
min_negative_parents = 4

[probe_corpus.baseline]
resolvers = ["1.1.1.1", "9.9.9.9", "8.8.8.8"]

[probe_corpus.negative]
parent_zones = ["com.", "net.", "de.", "jp."]
label_length = 40
validation_rounds = 3

[probe_corpus.selection]
max_per_operator_family = 3
max_per_tld = 3
