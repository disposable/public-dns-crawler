[probe_corpus]
schema_version = 2
corpus_version = "dev"
seed_path = "configs/probe-corpus-seeds.json"

[probe_corpus.baseline]
resolvers = ["1.1.1.1", "9.9.9.9", "8.8.8.8"]

[probe_corpus.negative]
parent_zones = ["com.", "net.", "de.", "jp.", "org.", "uk.", "fr."]
label_length = 40
validation_rounds = 3

[probe_corpus.selection]
max_per_operator_family = 4
max_per_tld = 30

[probe_corpus.validation.exact]
rounds = 2
required_quorum = 2

[probe_corpus.validation.consensus]
rounds = 2
required_quorum = 2

[probe_corpus.validation.negative]
rounds = 3
labels_per_parent = 3
required_quorum = 2
label_length = 40

[probe_corpus.thresholds]
min_positive_exact = 6
min_positive_consensus = 3
min_negative_generated = 3
